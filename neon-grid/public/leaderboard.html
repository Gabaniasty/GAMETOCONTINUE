<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON GRID — TOP OPERATIVES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .lb-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
      position: relative;
    }

    .lb-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
    }

    .lb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 800px;
      margin-bottom: 2.5rem;
    }

    .lb-title {
      font-size: clamp(1rem, 3vw, 1.6rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      color: #00f5ff;
      text-shadow: 0 0 12px #00f5ff, 0 0 24px rgba(0,245,255,0.4);
    }

    .lb-subtitle {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: rgba(224,224,255,0.35);
      margin-top: 4px;
    }

    .lb-table-wrap {
      width: 100%;
      max-width: 800px;
      background: rgba(10,10,20,0.88);
      border: 1px solid rgba(0,245,255,0.15);
      backdrop-filter: blur(10px);
    }

    .lb-thead {
      display: grid;
      grid-template-columns: 52px 1fr 80px 130px 80px 80px;
      gap: 4px;
      padding: 10px 18px;
      border-bottom: 1px solid rgba(0,245,255,0.3);
    }

    .lb-thead span {
      font-size: 0.5rem;
      letter-spacing: 0.22em;
      color: #00f5ff;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 52px 1fr 80px 130px 80px 80px;
      gap: 4px;
      padding: 8px 18px;
      border-bottom: 1px solid rgba(0,245,255,0.06);
      transition: background 0.15s, border-left 0.15s;
      border-left: 3px solid transparent;
      align-items: center;
    }

    .lb-row:last-child { border-bottom: none; }

    .lb-row:nth-child(odd)  { background: rgba(10,10,18,0.6); }
    .lb-row:nth-child(even) { background: rgba(13,13,26,0.6); }

    .lb-row:hover {
      background: rgba(26,0,51,0.7);
      border-left-color: #ff2d78;
    }

    .lb-row.current-user {
      border-left-color: #7b2fff;
      background: rgba(30,0,60,0.55);
    }

    .lb-row span {
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: rgba(224,224,255,0.7);
      display: flex;
      align-items: center;
    }

    .lb-rank {
      font-size: 0.7rem !important;
      font-weight: 700;
      color: rgba(224,224,255,0.4) !important;
    }

    .rank-gold   { color: #ffd700 !important; text-shadow: 0 0 8px #ffd700; }
    .rank-silver { color: #c0c0c0 !important; text-shadow: 0 0 8px #c0c0c0; }
    .rank-bronze { color: #cd7f32 !important; text-shadow: 0 0 8px #cd7f32; }

    .lb-username { font-weight: 700; }
    .username-gold   { color: #ffd700 !important; text-shadow: 0 0 10px #ffd700; }
    .username-silver { color: #c0c0c0 !important; text-shadow: 0 0 8px #c0c0c0; }
    .username-bronze { color: #cd7f32 !important; text-shadow: 0 0 8px #cd7f32; }
    .username-normal { color: #00f5ff !important; }

    .lb-empty {
      padding: 3rem;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: rgba(224,224,255,0.25);
    }

    .lb-footer {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 800px;
    }

    .lb-refresh-info {
      font-size: 0.48rem;
      letter-spacing: 0.18em;
      color: rgba(224,224,255,0.25);
    }

    #lb-status {
      font-size: 0.48rem;
      letter-spacing: 0.18em;
      color: #00f5ff;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #lb-status.visible { opacity: 1; }

    /* rank badge cells don't need flex align */
    .lb-badge-cell { display: flex; align-items: center; }
  </style>
</head>
<body>
  <div class="lb-wrap">
    <div class="lb-bg" aria-hidden="true"></div>

    <div class="lb-header">
      <div>
        <div class="lb-title">NEON GRID — TOP OPERATIVES</div>
        <div class="lb-subtitle">GLOBAL LEADERBOARD · SORTED BY XP</div>
      </div>
      <a href="/" class="btn btn-accent" style="font-size:.62rem;padding:.5rem 1.2rem;">← BACK</a>
    </div>

    <div class="lb-table-wrap">
      <div class="lb-thead">
        <span>RANK</span>
        <span>OPERATIVE</span>
        <span>LEVEL</span>
        <span>TIER</span>
        <span>K/D</span>
        <span>KILLS</span>
      </div>
      <div id="lb-body">
        <div class="lb-empty">LOADING…</div>
      </div>
    </div>

    <div class="lb-footer">
      <span class="lb-refresh-info">Auto-refreshes every 30 seconds</span>
      <span id="lb-status">↻ UPDATED</span>
    </div>
  </div>

  <script type="module">
    import { renderRankBadge } from '/js/RankBadge.js';

    const currentUser = localStorage.getItem('ng_username') || '';

    function rankClass(rank) {
      if (rank === 1) return 'rank-gold';
      if (rank === 2) return 'rank-silver';
      if (rank === 3) return 'rank-bronze';
      return '';
    }

    function usernameClass(rank) {
      if (rank === 1) return 'username-gold';
      if (rank === 2) return 'username-silver';
      if (rank === 3) return 'username-bronze';
      return 'username-normal';
    }

    async function loadLeaderboard() {
      try {
        const res  = await fetch('/auth/leaderboard');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = await res.json();

        const body = document.getElementById('lb-body');
        if (!rows.length) {
          body.innerHTML = '<div class="lb-empty">NO OPERATIVES RANKED YET. PLAY TO EARN XP.</div>';
          return;
        }

        body.innerHTML = '';
        rows.forEach((r, i) => {
          const pos       = i + 1;
          const isCurrent = r.username.toLowerCase() === currentUser.toLowerCase();

          const row = document.createElement('div');
          row.className = `lb-row${isCurrent ? ' current-user' : ''}`;

          // Position number
          const posSpan = document.createElement('span');
          posSpan.className = `lb-rank ${rankClass(pos)}`;
          posSpan.textContent = '#' + pos;

          // Username
          const nameSpan = document.createElement('span');
          nameSpan.className = `lb-username ${usernameClass(pos)}`;
          nameSpan.textContent = r.username;

          // Level
          const lvlSpan = document.createElement('span');
          lvlSpan.textContent = r.level;

          // Rank badge
          const badgeCell = document.createElement('span');
          badgeCell.className = 'lb-badge-cell';
          const tierName = r.rank_division > 1
            ? `${r.rank_tier} D${r.rank_division}`
            : r.rank_tier;
          badgeCell.appendChild(renderRankBadge(tierName, r.rank_points, 'sm'));

          // K/D
          const kdSpan = document.createElement('span');
          kdSpan.textContent = (r.kd_ratio || 0).toFixed(2);

          // Kills
          const killsSpan = document.createElement('span');
          killsSpan.textContent = r.kills;

          row.append(posSpan, nameSpan, lvlSpan, badgeCell, kdSpan, killsSpan);
          body.appendChild(row);
        });

        const status = document.getElementById('lb-status');
        status.classList.add('visible');
        setTimeout(() => status.classList.remove('visible'), 2000);
      } catch (err) {
        document.getElementById('lb-body').innerHTML =
          '<div class="lb-empty">FAILED TO LOAD DATA. RETRYING…</div>';
      }
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
  </script>
</body>
</html>
