<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON GRID — Play</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: none;
    }

    /* ── Pointer-lock overlay ── */
    #lock-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      z-index: 100;
      gap: 1rem;
    }

    #lock-overlay h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 900;
      color: #00f5ff;
      letter-spacing: 0.2em;
      text-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff;
      animation: blink 1.6s ease-in-out infinite;
    }

    #lock-overlay p {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: rgba(224, 224, 255, 0.4);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── Crosshair ── */
    #crosshair {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 50;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(0, 245, 255, 0.85);
    }

    /* horizontal bar */
    #crosshair::before {
      width: 18px;
      height: 2px;
      top: -1px;
      left: -9px;
    }

    /* vertical bar */
    #crosshair::after {
      width: 2px;
      height: 18px;
      top: -9px;
      left: -1px;
    }

    /* center dot gap */
    #crosshair-dot {
      width: 3px;
      height: 3px;
      background: #00f5ff;
      border-radius: 50%;
      position: absolute;
      top: -1.5px;
      left: -1.5px;
      box-shadow: 0 0 4px #00f5ff;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Click-to-play overlay -->
  <div id="lock-overlay">
    <h2>CLICK TO PLAY</h2>
    <p>WASD — MOVE &nbsp;·&nbsp; MOUSE — AIM &nbsp;·&nbsp; SPACE — JUMP &nbsp;·&nbsp; SHIFT — SPRINT</p>
  </div>

  <!-- Crosshair (shown only when pointer locked) -->
  <div id="crosshair"><div id="crosshair-dot"></div></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
