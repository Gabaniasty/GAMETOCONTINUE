<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON GRID — Play</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: none;
    }

    /* ── Loading screen ── */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: #02020a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      color: #00f5ff;
    }

    #loadingTitle {
      font-size: 2.5rem;
      letter-spacing: 0.35em;
      font-weight: 700;
      text-shadow: 0 0 14px #00f5ff, 0 0 28px #00f5ff;
      margin-bottom: 1.6rem;
      animation: loadPulse 1.8s ease-in-out infinite;
    }

    @keyframes loadPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }

    #loadingText {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      color: #aaaaff;
      margin-bottom: 1.2rem;
    }

    #loadingBar {
      width: 320px;
      height: 4px;
      background: #111133;
      border-radius: 2px;
    }

    #loadingFill {
      height: 100%;
      width: 0%;
      background: #00f5ff;
      box-shadow: 0 0 8px #00f5ff;
      transition: width 0.2s ease;
      border-radius: 2px;
    }

    /* ── Pointer-lock overlay ── */
    #lock-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      z-index: 100;
      gap: 1rem;
    }

    #lock-overlay h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 900;
      color: #00f5ff;
      letter-spacing: 0.2em;
      text-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff;
      animation: blink 1.6s ease-in-out infinite;
    }

    #lock-overlay p {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: rgba(224, 224, 255, 0.4);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── Scope overlay (WRAITH) ── */
    #scope-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      pointer-events: none;
    }

    #scope-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at 50% 50%,
        transparent 184px,
        rgba(2, 2, 10, 0.55) 189px,
        rgba(2, 2, 10, 0.97) 200px
      );
    }

    #scope-ring {
      position: absolute;
      width: 382px;
      height: 382px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(123, 47, 255, 0.75);
      box-shadow: 0 0 22px rgba(123, 47, 255, 0.4),
                  inset 0 0 22px rgba(123, 47, 255, 0.07);
    }

    #scope-reticle {
      position: absolute;
      width: 380px;
      height: 380px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #scope-reticle.scope-kick {
      animation: scope-kick 0.24s ease-out forwards;
    }

    @keyframes scope-kick {
      0%   { transform: translate(-50%, -50%) translateY(0)   rotate(0deg);    }
      18%  { transform: translate(-50%, -50%) translateY(-7px) rotate(2.2deg); }
      100% { transform: translate(-50%, -50%) translateY(0)   rotate(0deg);    }
    }

    #scope-lens-glare {
      position: absolute;
      width: 380px;
      height: 380px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(
        ellipse 55% 35% at 32% 22%,
        rgba(255,255,255,0.045) 0%,
        transparent 60%
      );
    }

    #scope-info {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, 208px);
      font-family: 'Orbitron', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.3em;
      color: rgba(123, 47, 255, 0.65);
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(123, 47, 255, 0.5);
    }

    /* ── Crosshair ── */
    #crosshair {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 50;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(0, 245, 255, 0.85);
    }

    #crosshair::before {
      width: 18px;
      height: 2px;
      top: -1px;
      left: -9px;
    }

    #crosshair::after {
      width: 2px;
      height: 18px;
      top: -9px;
      left: -1px;
    }

    #crosshair-dot {
      width: 3px;
      height: 3px;
      background: #00f5ff;
      border-radius: 50%;
      position: absolute;
      top: -1.5px;
      left: -1.5px;
      box-shadow: 0 0 4px #00f5ff;
    }
  </style>
</head>
<body>
  <!-- Loading screen (visible until GLTF map finishes loading) -->
  <div id="loadingScreen">
    <div id="loadingTitle">NEON GRID</div>
    <div id="loadingText">INITIALIZING...</div>
    <div id="loadingBar">
      <div id="loadingFill"></div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <!-- Click-to-play overlay (shown after loading completes) -->
  <div id="lock-overlay">
    <h2>CLICK TO PLAY</h2>
    <p>WASD — MOVE &nbsp;·&nbsp; MOUSE — AIM &nbsp;·&nbsp; SPACE — JUMP &nbsp;·&nbsp; SHIFT — SPRINT</p>
  </div>

  <!-- Crosshair -->
  <div id="crosshair"><div id="crosshair-dot"></div></div>

  <!-- Scope overlay — visible only when WRAITH aims in -->
  <div id="scope-overlay">
    <div id="scope-bg"></div>
    <svg id="scope-reticle" viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg">
      <line x1="0"   y1="190" x2="162" y2="190" stroke="#9b5fff" stroke-width="1.2" opacity="0.9"/>
      <line x1="218" y1="190" x2="380" y2="190" stroke="#9b5fff" stroke-width="1.2" opacity="0.9"/>
      <line x1="190" y1="0"   x2="190" y2="162" stroke="#9b5fff" stroke-width="1.2" opacity="0.9"/>
      <line x1="190" y1="218" x2="190" y2="380" stroke="#9b5fff" stroke-width="1.2" opacity="0.9"/>
      <circle cx="190" cy="190" r="2.8" fill="#d0a0ff"/>
      <circle cx="133" cy="190" r="3.2" fill="#7b2fff" opacity="0.85"/>
      <circle cx="247" cy="190" r="3.2" fill="#7b2fff" opacity="0.85"/>
      <circle cx="97"  cy="190" r="2.2" fill="#7b2fff" opacity="0.55"/>
      <circle cx="283" cy="190" r="2.2" fill="#7b2fff" opacity="0.55"/>
      <circle cx="190" cy="133" r="3.2" fill="#7b2fff" opacity="0.85"/>
      <circle cx="190" cy="247" r="3.2" fill="#7b2fff" opacity="0.85"/>
      <circle cx="190" cy="97"  r="2.2" fill="#7b2fff" opacity="0.55"/>
      <circle cx="190" cy="283" r="2.2" fill="#7b2fff" opacity="0.55"/>
      <line x1="183" y1="247" x2="197" y2="247" stroke="#7b2fff" stroke-width="1" opacity="0.6"/>
      <line x1="185" y1="283" x2="195" y2="283" stroke="#7b2fff" stroke-width="0.9" opacity="0.4"/>
      <line x1="247"  y1="183" x2="247"  y2="197" stroke="#7b2fff" stroke-width="1"   opacity="0.6"/>
      <circle cx="190" cy="190" r="185" fill="none" stroke="#7b2fff" stroke-width="1.2" opacity="0.5"/>
    </svg>
    <div id="scope-ring"></div>
    <div id="scope-lens-glare"></div>
    <div id="scope-info">6× · ION SNIPER</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
