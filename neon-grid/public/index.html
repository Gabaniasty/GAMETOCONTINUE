<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON GRID</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="landing">
    <div class="landing__bg-grid" aria-hidden="true"></div>

    <header class="landing__header">
      <span class="logo neon-glow">NG</span>
      <div id="user-badge" style="display:none" class="user-badge">
        <span id="user-badge-name"></span>
        <button id="logout-btn" class="btn btn-accent" style="padding:.35rem 1rem;font-size:.6rem;">LOGOUT</button>
      </div>
    </header>

    <main class="landing__main">
      <h1 class="landing__title neon-glow">NEON GRID</h1>
      <p class="landing__tagline">Fast. Brutal. Neon.</p>

      <div class="landing__actions">
        <button id="play-btn" class="btn">PLAY NOW</button>
        <button id="auth-btn" class="btn btn-secondary">LOGIN / REGISTER</button>
        <a href="/leaderboard.html" class="btn btn-accent" style="font-size:.7rem;">LEADERBOARD</a>
      </div>

      <!-- Stats card — visible when logged in -->
      <div id="stats-card" style="display:none" class="neon-card stats-card">
        <div class="stats-card__row">
          <div class="stats-card__item">
            <span class="stats-card__label">LEVEL</span>
            <span class="stats-card__value" id="sc-level">—</span>
          </div>
          <div class="stats-card__item">
            <span class="stats-card__label">XP</span>
            <span class="stats-card__value" id="sc-xp">—</span>
          </div>
          <div class="stats-card__item">
            <span class="stats-card__label">KILLS</span>
            <span class="stats-card__value" id="sc-kills">—</span>
          </div>
          <div class="stats-card__item">
            <span class="stats-card__label">K/D</span>
            <span class="stats-card__value" id="sc-kd">—</span>
          </div>
          <div class="stats-card__item">
            <span class="stats-card__label">RANK</span>
            <span class="stats-card__value stats-card__value--accent" id="sc-rank">—</span>
          </div>
        </div>
      </div>
    </main>

    <footer class="landing__footer">
      <span class="footer-text">© 2025 NEON GRID · ALL RIGHTS RESERVED</span>
    </footer>
  </div>

  <script type="module">
    import { Auth } from '/js/Auth.js';

    const auth = new Auth();

    const playBtn  = document.getElementById('play-btn');
    const authBtn  = document.getElementById('auth-btn');
    const badge    = document.getElementById('user-badge');
    const badgeName = document.getElementById('user-badge-name');
    const logoutBtn = document.getElementById('logout-btn');

    const statsCard = document.getElementById('stats-card');

    async function loadStats() {
      const token = auth.getToken ? auth.getToken() : localStorage.getItem('ng_token');
      if (!token) return;
      try {
        const res = await fetch('/api/stats/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) return;
        const { stats, rank } = await res.json();
        document.getElementById('sc-level').textContent = stats.level;
        document.getElementById('sc-xp').textContent    = stats.xp.toLocaleString();
        document.getElementById('sc-kills').textContent = stats.kills;
        const kd = (stats.kills / Math.max(stats.deaths, 1)).toFixed(2);
        document.getElementById('sc-kd').textContent   = kd;
        document.getElementById('sc-rank').textContent = rank ? `#${rank}` : '—';
        statsCard.style.display = 'block';
      } catch (_) {}
    }

    function updateUI() {
      if (auth.isLoggedIn()) {
        badge.style.display    = 'flex';
        badgeName.textContent  = auth.getUsername();
        authBtn.style.display  = 'none';
        loadStats();
      } else {
        badge.style.display    = 'none';
        authBtn.style.display  = '';
        statsCard.style.display = 'none';
      }
    }

    updateUI();

    function navigate(url) {
      document.body.classList.add('page-exit');
      setTimeout(() => { window.location.href = url; }, 280);
    }

    playBtn.addEventListener('click', () => {
      if (auth.isLoggedIn()) {
        navigate('/class-select.html');
      } else {
        auth.showModal((username) => {
          navigate('/class-select.html');
        });
      }
    });

    authBtn.addEventListener('click', () => {
      auth.showModal((username) => updateUI());
    });

    logoutBtn.addEventListener('click', () => {
      auth.logout();
      statsCard.style.display = 'none';
    });
  </script>

  <style>
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .landing__bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 40%, transparent 100%);
      pointer-events: none;
    }

    .landing__header {
      position: fixed; top: 1.5rem; left: 2rem;
      display: flex; align-items: center; gap: 1.5rem;
    }

    .logo {
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      font-size: 1.4rem; color: #00f5ff; letter-spacing: 0.1em;
    }

    .user-badge {
      display: flex; align-items: center; gap: .75rem;
    }

    #user-badge-name {
      font-family: 'Orbitron', sans-serif; font-size: .7rem;
      letter-spacing: .15em; color: #7b2fff;
      text-shadow: 0 0 8px #7b2fff;
    }

    .landing__main {
      display: flex; flex-direction: column; align-items: center;
      gap: 1.5rem; text-align: center; z-index: 1;
    }

    .landing__title {
      font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 900;
      color: #00f5ff; letter-spacing: 0.12em; line-height: 1;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff; }
      50%       { text-shadow: 0 0 20px #00f5ff, 0 0 40px #00f5ff, 0 0 60px rgba(0,245,255,0.4); }
    }

    .landing__tagline {
      font-size: clamp(0.85rem, 2.5vw, 1.1rem); font-weight: 400;
      letter-spacing: 0.4em; text-transform: uppercase;
      color: #ff2d78; text-shadow: 0 0 8px #ff2d78;
    }

    .landing__actions {
      display: flex; flex-direction: column; align-items: center;
      gap: 1rem; margin-top: 1rem;
    }

    .stats-card {
      margin-top: 0.25rem;
      min-width: 340px;
    }

    .stats-card__row {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
    }

    .stats-card__item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }

    .stats-card__label {
      font-size: 0.42rem; letter-spacing: 0.22em;
      color: rgba(224,224,255,0.35);
    }

    .stats-card__value {
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em;
      color: #e0e0ff;
    }

    .stats-card__value--accent {
      color: #7b2fff;
      text-shadow: 0 0 8px #7b2fff;
    }

    .landing__actions .btn { min-width: 220px; text-align: center; }

    .landing__footer {
      position: fixed; bottom: 1.5rem;
      left: 50%; transform: translateX(-50%);
    }

    .footer-text {
      font-size: 0.6rem; letter-spacing: 0.25em;
      color: rgba(224, 224, 255, 0.3);
    }
  </style>
</body>
</html>
